name: e2e prod smoke

# Run after Vercel finishes deploying main to production. Vercel doesn't push
# webhook events into GitHub Actions natively — we ride on `deployment_status`,
# which Vercel does emit when its GitHub integration is enabled.
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override target URL (defaults to E2E_PROD_URL secret)"
        required: false

concurrency:
  group: e2e-prod-smoke
  cancel-in-progress: false

jobs:
  smoke:
    # Only fire on successful production deploys from Vercel — ignore previews
    # and failed deploys. Always allow manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Resolve target URL
        id: target
        # Prefer the configured canonical alias (vars.E2E_PROD_URL) over
        # deployment_status.target_url — Vercel's per-deployment hosts are
        # gated by Deployment Protection and serve a 401 "Login – Vercel"
        # page to anonymous CI requests. The public alias is the only host
        # that survives anonymous traffic.
        run: |
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "url=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.E2E_PROD_URL }}" ]; then
            echo "url=${{ vars.E2E_PROD_URL }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.deployment_status.target_url }}" ]; then
            echo "url=${{ github.event.deployment_status.target_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "no target URL — set repo variable E2E_PROD_URL" >&2
            exit 1
          fi

      - name: Warmup
        run: |
          set -e
          for path in / /developers; do
            echo "warmup ${{ steps.target.outputs.url }}$path"
            curl -fsSL -o /dev/null -w "%{http_code} %{url_effective}\n" \
              "${{ steps.target.outputs.url }}$path" || true
          done

      - name: Run smoke specs
        env:
          E2E_BASE_URL: ${{ steps.target.outputs.url }}
        run: pnpm exec playwright test --project=chromium --grep @smoke

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
